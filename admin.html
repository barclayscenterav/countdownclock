<style>
* {
  box-sizing: border-box;
}

body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  margin:0;

  /* safe centering (more stable than pure flex on body) */
  min-height:100vh;
  display:grid;
  place-items:center;
}

/* container */
.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:400px;

  display:flex;
  flex-direction:column;
  align-items:stretch;
  gap:12px;

  text-align:center;
}

h2{
  margin:0 0 10px 0;
}

input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  outline:none;
  text-align:center;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
}

button:hover{
  background:#2563eb;
}

#out{
  width:100%;
}
</style>
