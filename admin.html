<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
* {
  box-sizing: border-box;
}

body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  margin:0;

  min-height:100vh;
  display:grid;
  place-items:center;
}

/* main panel */
.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:400px;

  display:flex;
  flex-direction:column;
  align-items:stretch;
  gap:12px;

  text-align:center;
}

h2{
  margin:0 0 10px 0;
}

input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  outline:none;
  text-align:center;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
}

button:hover{
  background:#2563eb;
}

#out{
  width:100%;
  padding:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Create Countdown</h2>

  <input id="title" placeholder="Title (e.g. Knicks vs Celtics)">
  <input id="event" placeholder="Alert text (e.g. Game)">
  <input id="end" type="datetime-local">

  <button onclick="gen()">Generate</button>

  <input id="out" readonly>
</div>

<script>

function gen(){

  const titleVal = document.getElementById("title").value;
  const eventVal = document.getElementById("event").value;
  const endVal = document.getElementById("end").value;

  if(!titleVal || !endVal){
    alert("Title and End time are required");
    return;
  }

  const base =
    window.location.origin +
    "/countdownclock/index";

  const url =
    `${base}?title=${encodeURIComponent(titleVal)}&event=${encodeURIComponent(eventVal)}&end=${encodeURIComponent(endVal)}`;

  document.getElementById("out").value = url;

  console.log("Generated URL:", url);
}

</script>

</body>
</html>
