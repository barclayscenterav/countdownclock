<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:400px;
}

input{
  width:100%;
  margin:10px 0;
  padding:10px;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Countdown</h2>

<input id="title" placeholder="Title (e.g. Knicks vs Celtics)">
<input id="event" placeholder="Alert text (e.g. Game)">
<input id="end" type="datetime-local">

<button onclick="gen()">Generate</button>

<input id="out" readonly>
</div>

<script>

function gen(){

  const t = title.value;
  const e = event.value;
  const end = end.value;

  const base =
    window.location.origin +
    "/countdownclock/index.html";

  const url =
`${base}?title=${encodeURIComponent(t)}&event=${encodeURIComponent(e)}&end=${encodeURIComponent(end)}`;

  out.value = url;
}

</script>

</body>
</html>
