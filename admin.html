<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:grid;
  place-items:center;
}

.box{
  width:500px;
  background:#1e293b;
  padding:30px;
  border-radius:14px;

  display:flex;
  flex-direction:column;
  gap:14px;
}

h2{
  margin:0;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  outline:none;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

/* preview card */
.preview{
  background:#0f172a;
  border-radius:10px;
  padding:16px;
}

.preview-title{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:8px;
  text-transform:uppercase;
}

#urlPreview{
  word-break:break-all;
  color:#38bdf8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">

  <h2>Create Countdown</h2>

  <input
    id="title"
    placeholder="Title (e.g. Fever vs Valkyries)"
  >

  <input
    id="event"
    placeholder="Alert text (e.g. Doors)"
  >

  <input
    id="end"
    type="datetime-local"
  >

  <button onclick="copyURL()">
    Copy URL
  </button>

  <!-- LIVE URL -->
  <div class="preview">

    <div class="preview-title">
      Live URL
    </div>

    <div id="urlPreview">
      Waiting for input...
    </div>

  </div>

</div>

<script>

/* =========================
   ELEMENTS
========================= */

const titleInput =
  document.getElementById("title");

const eventInput =
  document.getElementById("event");

const endInput =
  document.getElementById("end");

const urlPreview =
  document.getElementById("urlPreview");

/* =========================
   URL BUILDER
========================= */

function buildURL(){

  const title =
    titleInput.value.trim();

  const event =
    eventInput.value.trim();

  const end =
    endInput.value;

  const base =
    window.location.origin +
    "/countdownclock/index";

  const url = new URL(base);

  url.searchParams.set("title", title);
  url.searchParams.set("event", event);
  url.searchParams.set("end", end);

  return url.toString();
}

/* =========================
   LIVE URL UPDATE
========================= */

function updatePreview(){

  urlPreview.innerText =
    buildURL();
}

/* =========================
   COPY URL
========================= */

function copyURL(){

  const url =
    buildURL();

  navigator.clipboard.writeText(url);

  alert("URL copied!");
}

/* =========================
   LIVE LISTENERS
========================= */

titleInput.addEventListener(
  "input",
  updatePreview
);

eventInput.addEventListener(
  "input",
  updatePreview
);

endInput.addEventListener(
  "input",
  updatePreview
);

/* initial */
updatePreview();

</script>

</body>
</html>
