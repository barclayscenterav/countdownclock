<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown Admin</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:600px;
  background:#1e293b;
  padding:40px;
  border-radius:20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

label{
  display:block;
  margin-bottom:10px;
  color:#cbd5e1;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:25px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

#result{
  margin-top:30px;
  display:none;
}

#shareUrl{
  width:100%;
  margin-top:15px;
  background:#0f172a;
  color:#4ade80;
}

.copy-btn{
  margin-top:15px;
  background:#10b981;
}

</style>
</head>

<body>

<div class="container">

  <h1>Create Countdown</h1>

  <label>Countdown Title</label>
  <input type="text" id="title">

  <label>Event Label (alerts)</label>
  <input type="text" id="event">

  <label>End Date & Time</label>
  <input type="datetime-local" id="endTime">

  <button onclick="generateUrl()">
    Generate Shareable URL
  </button>

  <div id="result">

    <label>Shareable URL</label>

    <input type="text" id="shareUrl" readonly>

    <button class="copy-btn" onclick="copyUrl()">
      Copy URL
    </button>

  </div>

</div>

<script>

function generateUrl(){

  const title =
    document.getElementById("title").value.trim();

  const event =
    document.getElementById("event").value.trim();

  const endTime =
    document.getElementById("endTime").value;

  if(!title || !event || !endTime){
    alert("Please fill out all fields.");
    return;
  }

  const encodedTitle = encodeURIComponent(title);
  const encodedEvent = encodeURIComponent(event);
  const encodedEnd = encodeURIComponent(endTime);

  // 🔥 FIXED: hard-coded correct GitHub Pages path
  const finalUrl =
    `https://barclayscenterav.github.io/countdownclock/index?title=${encodedTitle}&event=${encodedEvent}&end=${encodedEnd}`;

  document.getElementById("shareUrl").value = finalUrl;
  document.getElementById("result").style.display = "block";
}

function copyUrl(){

  const urlField =
    document.getElementById("shareUrl");

  urlField.select();
  document.execCommand("copy");

  alert("URL copied!");
}

</script>

</body>
</html>
