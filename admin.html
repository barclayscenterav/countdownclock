<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px;
}

.box{
  width:500px;
  max-width:100%;
  background:#1e293b;
  padding:30px;
  border-radius:14px;

  display:flex;
  flex-direction:column;
  gap:18px;
}

h2{
  margin:0;
  text-align:center;
  font-size:2rem;
}

/* form groups */

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

label{
  font-size:15px;
  color:#cbd5e1;
  font-weight:600;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  font-size:16px;
  outline:none;
  text-align:center;
  background:white;
  color:#0f172a;
}

/* button */

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#2563eb;
}

/* preview card */

.preview{
  background:#0f172a;
  border-radius:10px;
  padding:16px;
}

.preview-title{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:8px;
  text-transform:uppercase;
  font-weight:bold;
}

#urlPreview{
  word-break:break-all;
  color:#38bdf8;
  font-size:14px;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="box">

  <h2>Create Countdown</h2>

  <!-- TITLE -->

  <div class="field">

    <label for="title">
      Matchup Title
    </label>

    <input
      id="title"
      placeholder="e.g. Fever vs Valkyries"
    >

  </div>

  <!-- DOORS -->

  <div class="field">

    <label for="doorsEnd">
      Doors Time
    </label>

    <input
      id="doorsEnd"
      type="datetime-local"
    >

  </div>

  <!-- VIP DOORS -->

  <div class="field">

    <label for="vipEnd">
      VIP Doors Time
    </label>

    <input
      id="vipEnd"
      type="datetime-local"
    >

  </div>

  <!-- BUTTON -->

  <button onclick="copyURL()">
    Copy URL
  </button>

  <!-- URL PREVIEW -->

  <div class="preview">

    <div class="preview-title">
      Live URL
    </div>

    <div id="urlPreview">
      Waiting for input...
    </div>

  </div>

</div>

<script>

/* =========================
   ELEMENTS
========================= */

const titleInput =
  document.getElementById("title");

const doorsEndInput =
  document.getElementById("doorsEnd");

const vipEndInput =
  document.getElementById("vipEnd");

const urlPreview =
  document.getElementById("urlPreview");

/* =========================
   URL BUILDER
========================= */

function buildURL(){

  const title =
    titleInput.value.trim();

  const doorsEnd =
    doorsEndInput.value;

  const vipEnd =
    vipEndInput.value;

  const base =
    window.location.origin +
    "/countdownclock/index";

  const url =
    new URL(base);

  url.searchParams.set(
    "title",
    title
  );

  url.searchParams.set(
    "doorsEnd",
    doorsEnd
  );

  url.searchParams.set(
    "vipEnd",
    vipEnd
  );

  return url.toString();
}

/* =========================
   LIVE PREVIEW
========================= */

function updatePreview(){

  const title =
    titleInput.value.trim();

  const doorsEnd =
    doorsEndInput.value.trim();

  const vipEnd =
    vipEndInput.value.trim();

  if(
    !title ||
    !doorsEnd ||
    !vipEnd
  ){

    urlPreview.innerText =
      "Waiting for input...";

    return;
  }

  urlPreview.innerText =
    buildURL();
}

/* =========================
   COPY URL
========================= */

async function copyURL(){

  const title =
    titleInput.value.trim();

  const doorsEnd =
    doorsEndInput.value.trim();

  const vipEnd =
    vipEndInput.value.trim();

  if(
    !title ||
    !doorsEnd ||
    !vipEnd
  ){

    alert(
      "Please complete all fields."
    );

    return;
  }

  const url =
    buildURL();

  try{

    await navigator.clipboard.writeText(
      url
    );

    alert(
      "URL copied!"
    );

  }catch(err){

    alert(
      "Copy failed. Please copy manually."
    );
  }
}

/* =========================
   LISTENERS
========================= */

titleInput.addEventListener(
  "input",
  updatePreview
);

doorsEndInput.addEventListener(
  "input",
  updatePreview
);

vipEndInput.addEventListener(
  "input",
  updatePreview
);

/* initial */

updatePreview();

</script>

</body>
</html>
