<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Admin</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  background:#1e293b;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
  margin-bottom:30px;
  text-align:center;
}

label{
  display:block;
  margin-bottom:10px;
  color:#cbd5e1;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:25px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

.reset-btn{
  margin-top:15px;
  background:#ef4444;
}

.success{
  margin-top:20px;
  color:#4ade80;
  text-align:center;
  font-size:16px;
}

</style>
</head>

<body>

<div class="container">

  <h1>Countdown Admin</h1>

  <label>Countdown Title</label>
  <input
    type="text"
    id="title"
    placeholder="Example: Vacation Countdown"
  >

  <label>End Date & Time</label>
  <input
    type="datetime-local"
    id="endTime"
  >

  <button onclick="saveCountdown()">
    Save Countdown
  </button>

  <button
    class="reset-btn"
    onclick="resetCountdown()"
  >
    Reset Countdown
  </button>

  <div class="success" id="successMessage"></div>

</div>

<script>

function saveCountdown(){

  const title =
    document.getElementById("title").value;

  const endTime =
    document.getElementById("endTime").value;

  if(!title || !endTime){
    alert("Please fill out all fields.");
    return;
  }

  localStorage.setItem(
    "countdownTitle",
    title
  );

  localStorage.setItem(
    "countdownEndTime",
    endTime
  );

  document.getElementById(
    "successMessage"
  ).innerText =
    "Countdown saved successfully!";
}

function resetCountdown(){

  localStorage.removeItem(
    "countdownTitle"
  );

  localStorage.removeItem(
    "countdownEndTime"
  );

  document.getElementById(
    "title"
  ).value = "";

  document.getElementById(
    "endTime"
  ).value = "";

  document.getElementById(
    "successMessage"
  ).innerText =
    "Countdown reset successfully!";
}

window.onload = function(){

  const savedTitle =
    localStorage.getItem(
      "countdownTitle"
    );

  const savedEndTime =
    localStorage.getItem(
      "countdownEndTime"
    );

  if(savedTitle){
    document.getElementById(
      "title"
    ).value = savedTitle;
  }

  if(savedEndTime){
    document.getElementById(
      "endTime"
    ).value = savedEndTime;
  }
}

</script>

</body>
</html>
