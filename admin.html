<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* main container */
.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:400px;

  /* ✅ CENTER EVERYTHING INSIDE */
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:12px;
}

h2{
  margin:0 0 10px 0;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  outline:none;
  text-align:center; /* optional but matches centered style */
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
}

button:hover{
  background:#2563eb;
}

#out{
  width:100%;
  margin-top:10px;
}
</style>
