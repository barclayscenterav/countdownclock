<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barclays Center Countdown</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#00395d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  overflow:hidden;
  position:relative;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* split logos */
.bg-left,
.bg-right{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  opacity:0.3;
  z-index:0;
  pointer-events:none;
}

.bg-left{
  left:0;
}

.bg-right{
  right:0;
}

/* dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* main container */
.container{
  position:relative;
  z-index:2;
  max-width:1400px;
  width:100%;
  padding:24px;
}

h1{
  font-size:4.4rem;
  text-transform:uppercase;
  margin:0 0 28px;
  line-height:1;
}

/* countdown sections */
.countdown-wrap{
  display:flex;
  flex-direction:column;
  gap:36px;
}

.countdown-block{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.countdown-title{
  font-size:2.5rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:2px;
  color:#ffffff;
  line-height:1;
}

.target-time{
  font-size:1.9rem;
  color:#cbd5e1;
  line-height:1.25;
  font-weight:700;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:46px 36px;
  border-radius:24px;
  transition:
    background 0.3s ease,
    box-shadow 0.3s ease,
    border 0.3s ease;
  border:4px solid transparent;
}

.number{
  font-size:10rem;
  font-weight:900;
  line-height:0.9;
  letter-spacing:-4px;
}

.label{
  text-transform:uppercase;
  color:#cbd5e1;
  margin-top:18px;
  font-size:1.6rem;
  font-weight:800;
  letter-spacing:1px;
}

/* yellow state applied directly to boxes */
.box.state-yellow{
  background:rgba(234,179,8,0.45);
  border-color:#eab308;
  box-shadow:0 0 34px rgba(234,179,8,0.7);
}

.box.state-yellow .label{
  color:white;
}

/* red state applied directly to boxes */
.box.state-red{
  background:rgba(220,38,38,0.55);
  border-color:#ef4444;
  box-shadow:0 0 38px rgba(220,38,38,0.85);
}

.box.state-red .label{
  color:white;
}

/* bottom clock */
#timeOfDay{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:2.6rem;
  font-weight:900;
  color:#fff;
  z-index:2;
  text-transform:uppercase;
  display:flex;
  justify-content:center;
}

#timeOfDay span{
  white-space:nowrap;
}

.time-dot{
  animation:flashDot 1s infinite;
}

@keyframes flashDot{
  0%,100%{
    opacity:1;
  }

  50%{
    opacity:0.2;
  }
}

/* alert overlay */
#alertOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#alertBox{
  font-size:6rem;
  font-weight:900;
  color:red;
  text-transform:uppercase;
  animation:flashAlert 0.7s infinite;
  white-space:pre-line;
  line-height:1.12;
}

@keyframes flashAlert{
  0%{
    opacity:1;
    transform:scale(1);
  }

  50%{
    opacity:0.25;
    transform:scale(1.08);
  }

  100%{
    opacity:1;
    transform:scale(1);
  }
}

/* keeps oversized text from breaking smaller screens */
@media (max-width:1100px){
  h1{
    font-size:3.4rem;
  }

  .number{
    font-size:7.5rem;
  }

  .box{
    padding:34px 24px;
  }

  .countdown-title{
    font-size:2rem;
  }

  .target-time{
    font-size:1.5rem;
  }

  .label{
    font-size:1.3rem;
  }

  #timeOfDay{
    font-size:2rem;
  }

  #alertBox{
    font-size:4.5rem;
  }
}
</style>
</head>

<body>

<div class="bg-left" id="bgLeft"></div>
<div class="bg-right" id="bgRight"></div>

<div class="container">

  <h1 id="title"></h1>

  <div class="countdown-wrap">

    <!-- VIP DOORS COUNTDOWN -->
    <div class="countdown-block" id="vipBlock">

      <div class="countdown-title">
        VIP Doors
      </div>

      <div id="vipTargetTime" class="target-time"></div>

      <div class="countdown">

        <div class="box vip-box">
          <div id="vipHours" class="number">00</div>
          <div id="vipHoursLabel" class="label">Hours</div>
        </div>

        <div class="box vip-box">
          <div id="vipMinutes" class="number">00</div>
          <div id="vipMinutesLabel" class="label">Minutes</div>
        </div>

        <div class="box vip-box">
          <div id="vipSeconds" class="number">00</div>
          <div id="vipSecondsLabel" class="label">Seconds</div>
        </div>

      </div>

    </div>

    <!-- DOORS COUNTDOWN -->
    <div class="countdown-block" id="doorsBlock">

      <div class="countdown-title">
        Doors
      </div>

      <div id="doorsTargetTime" class="target-time"></div>

      <div class="countdown">

        <div class="box doors-box">
          <div id="doorsHours" class="number">00</div>
          <div id="doorsHoursLabel" class="label">Hours</div>
        </div>

        <div class="box doors-box">
          <div id="doorsMinutes" class="number">00</div>
          <div id="doorsMinutesLabel" class="label">Minutes</div>
        </div>

        <div class="box doors-box">
          <div id="doorsSeconds" class="number">00</div>
          <div id="doorsSecondsLabel" class="label">Seconds</div>
        </div>

      </div>

    </div>

  </div>

</div>

<div id="timeOfDay"></div>

<div id="alertOverlay">
  <div id="alertBox"></div>
</div>

<script>

/* =========================
   ELEMENTS
========================= */

const titleEl =
  document.getElementById("title");

const bgLeft =
  document.getElementById("bgLeft");

const bgRight =
  document.getElementById("bgRight");

const doorsTargetTime =
  document.getElementById("doorsTargetTime");

const vipTargetTime =
  document.getElementById("vipTargetTime");

const timeOfDay =
  document.getElementById("timeOfDay");

const alertOverlay =
  document.getElementById("alertOverlay");

const alertBox =
  document.getElementById("alertBox");

/* =========================
   URL PARAMS
========================= */

const params =
  new URLSearchParams(location.search);

const titleRaw =
  params.get("title") || "";

const doorsEnd =
  params.get("doorsEnd") || params.get("end");

const vipEnd =
  params.get("vipEnd") || params.get("end");

const backgroundImage =
  params.get("bg") || "";

if(
  !titleRaw ||
  !doorsEnd ||
  !vipEnd
){

  document.body.innerHTML =
    "Invalid countdown link";

  throw new Error(
    "Missing required countdown parameters"
  );
}

const doorsTarget =
  new Date(doorsEnd).getTime();

const vipTarget =
  new Date(vipEnd).getTime();

if(
  Number.isNaN(doorsTarget) ||
  Number.isNaN(vipTarget)
){

  document.body.innerHTML =
    "Invalid countdown date";

  throw new Error(
    "Invalid countdown date"
  );
}

/* =========================
   NORMALIZER
========================= */

function normalizeTeamName(input){

  return (input || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g," ")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g,"")
    .trim();
}

/* =========================
   ALIASES
========================= */

const teamAliases = {

  "76ers":"sixers",
  "philadelphia 76ers":"sixers",

  "trail blazers":"blazers",
  "trailblazers":"blazers"
};

function applyAlias(key){

  return teamAliases[key] || key;
}

/* =========================
   NBA
========================= */

const nbaTeams = {

  hawks:{id:"1610612737"},
  celtics:{id:"1610612738"},
  hornets:{id:"1610612766"},
  bulls:{id:"1610612741"},
  cavaliers:{id:"1610612739"},
  mavericks:{id:"1610612742"},
  nuggets:{id:"1610612743"},
  pistons:{id:"1610612765"},
  warriors:{id:"1610612744"},
  rockets:{id:"1610612745"},
  pacers:{id:"1610612754"},
  clippers:{id:"1610612746"},
  lakers:{id:"1610612747"},
  grizzlies:{id:"1610612763"},
  heat:{id:"1610612748"},
  bucks:{id:"1610612749"},
  timberwolves:{id:"1610612750"},
  pelicans:{id:"1610612740"},
  knicks:{id:"1610612752"},
  thunder:{id:"1610612760"},
  magic:{id:"1610612753"},
  sixers:{id:"1610612755"},
  suns:{id:"1610612756"},
  blazers:{id:"1610612757"},
  kings:{id:"1610612758"},
  spurs:{id:"1610612759"},
  raptors:{id:"1610612761"},
  jazz:{id:"1610612762"},
  wizards:{id:"1610612764"},
  nets:{id:"1610612751"}
};

/* =========================
   WNBA
========================= */

const wnbaTeams = {

  aces:{id:"1611661319"},
  dream:{id:"1611661330"},
  fever:{id:"1611661325"},
  liberty:{id:"1611661313"},
  lynx:{id:"1611661324"},
  mercury:{id:"1611661317"},
  mystics:{id:"1611661322"},
  sky:{id:"1611661329"},
  sparks:{id:"1611661320"},
  storm:{id:"1611661328"},
  sun:{id:"1611661323"},
  tempo:{id:"1611661332"},
  valkyries:{id:"1611661331"},
  wings:{id:"1611661321"},
  fire:{id:"1611661327"}
};

/* =========================
   SMART MATCHUP PARSER
========================= */

function parseMatchup(title){

  const normalized =
    normalizeTeamName(title)
      .replace(/\s/g,"");

  const allTeams = [

    ...Object.keys(nbaTeams),
    ...Object.keys(wnbaTeams),
    ...Object.keys(teamAliases)
  ];

  const matches =
    [];

  for(const team of allTeams){

    const normalizedTeam =
      team.replace(/\s/g,"");

    const index =
      normalized.indexOf(normalizedTeam);

    if(index !== -1){

      matches.push({
        team:applyAlias(team),
        index:index,
        length:normalizedTeam.length
      });
    }
  }

  if(matches.length < 2){
    return null;
  }

  matches.sort(
    (a,b) =>
      a.index - b.index ||
      b.length - a.length
  );

  const unique =
    [];

  for(const match of matches){

    if(!unique.includes(match.team)){
      unique.push(match.team);
    }

    if(unique.length === 2){
      break;
    }
  }

  if(unique.length < 2){
    return null;
  }

  return {
    left:unique[0],
    right:unique[1]
  };
}

/* =========================
   TEAM LOOKUP
========================= */

function find(team){

  let key =
    normalizeTeamName(team);

  key =
    applyAlias(key);

  key =
    key.replace(/\s/g,"");

  if(nbaTeams[key]){

    return {
      league:"nba",
      ...nbaTeams[key]
    };
  }

  if(wnbaTeams[key]){

    return {
      league:"wnba",
      ...wnbaTeams[key]
    };
  }

  return null;
}

/* =========================
   LOGO URL
========================= */

function logo(team){

  if(!team){
    return null;
  }

  if(team.league === "nba"){

    return `https://cdn.nba.com/logos/nba/${team.id}/primary/D/logo.svg`;
  }

  return `https://cdn.wnba.com/logos/wnba/${team.id}/primary/D/logo.svg`;
}

/* =========================
   APPLY LOGOS
========================= */

function applyLogos(){

  const matchup =
    parseMatchup(titleRaw);

  if(!matchup){
    return;
  }

  const leftTeam =
    find(matchup.left);

  const rightTeam =
    find(matchup.right);

  const leftLogo =
    logo(leftTeam);

  const rightLogo =
    logo(rightTeam);

  if(leftLogo){

    bgLeft.style.backgroundImage =
      `url(${leftLogo})`;
  }

  if(rightLogo){

    bgRight.style.backgroundImage =
      `url(${rightLogo})`;
  }
}

/* =========================
   APPLY BACKGROUND
========================= */

function applyBackground(){

  if(backgroundImage){

    document.body.style.backgroundImage =
      `url("${backgroundImage}")`;

    bgLeft.style.display =
      "none";

    bgRight.style.display =
      "none";

    return;
  }

  applyLogos();
}

/* =========================
   ALERT SYSTEM
========================= */

const alertTimes = [

  [3600000,"1 HOUR"],
  [1800000,"30 MINUTES"],
  [900000,"15 MINUTES"],
  [600000,"10 MINUTES"],
  [300000,"5 MINUTES"]
];

let triggeredDoors =
  {};

let triggeredVip =
  {};

let alertTimeout =
  null;

function showAlert(text){

  if(alertTimeout){
    clearTimeout(alertTimeout);
  }

  alertBox.innerText =
    text;

  alertOverlay.style.display =
    "flex";

  alertTimeout =
    setTimeout(() => {

      alertOverlay.style.display =
        "none";

    }, 10000);
}

/* refresh-safe init */
(function initTriggered(){

  const now =
    Date.now();

  const remainingDoors =
    doorsTarget - now;

  const remainingVip =
    vipTarget - now;

  for(const [time] of alertTimes){

    triggeredDoors[time] =
      remainingDoors <= time;

    triggeredVip[time] =
      remainingVip <= time;
  }

})();

function collectAlerts(
  remaining,
  triggeredMap,
  suffix
){

  const messages =
    [];

  for(const [threshold,label] of alertTimes){

    if(
      remaining <= threshold &&
      !triggeredMap[threshold]
    ){

      triggeredMap[threshold] =
        true;

      messages.push(
        `${label} TO ${suffix}`
      );
    }
  }

  return messages;
}

/* =========================
   COUNTDOWN HELPERS
========================= */

function labelSingular(
  value,
  singular,
  plural
){

  return Number(value) === 1
    ? singular
    : plural;
}

function getCountdownParts(ms){

  const safe =
    Math.max(0, ms);

  const hNum =
    Math.floor(safe / 3600000);

  const mNum =
    Math.floor((safe % 3600000) / 60000);

  const sNum =
    Math.floor((safe % 60000) / 1000);

  return {
    hNum:hNum,
    mNum:mNum,
    sNum:sNum,
    h:String(hNum).padStart(2,"0"),
    m:String(mNum).padStart(2,"0"),
    s:String(sNum).padStart(2,"0")
  };
}

function renderBlock(prefix, parts){

  document.getElementById(`${prefix}Hours`).innerText =
    parts.h;

  document.getElementById(`${prefix}Minutes`).innerText =
    parts.m;

  document.getElementById(`${prefix}Seconds`).innerText =
    parts.s;

  document.getElementById(`${prefix}HoursLabel`).innerText =
    labelSingular(
      parts.hNum,
      "Hour",
      "Hours"
    );

  document.getElementById(`${prefix}MinutesLabel`).innerText =
    labelSingular(
      parts.mNum,
      "Minute",
      "Minutes"
    );

  document.getElementById(`${prefix}SecondsLabel`).innerText =
    labelSingular(
      parts.sNum,
      "Second",
      "Seconds"
    );
}

function setBoxAlertState(boxClass, remaining){

  const boxes =
    document.querySelectorAll(`.${boxClass}`);

  boxes.forEach(box => {

    box.classList.remove(
      "state-yellow",
      "state-red"
    );

    if(remaining <= 600000){

      box.classList.add(
        "state-red"
      );

      return;
    }

    if(remaining <= 1800000){

      box.classList.add(
        "state-yellow"
      );
    }
  });
}

/* =========================
   INIT
========================= */

titleEl.innerText =
  titleRaw.toUpperCase();

const eventDateDoors =
  new Date(doorsEnd);

const eventDateVip =
  new Date(vipEnd);

vipTargetTime.innerText =
  eventDateVip.toLocaleString(
    undefined,
    {
      weekday:"long",
      month:"long",
      day:"numeric",
      year:"numeric",
      hour:"numeric",
      minute:"2-digit"
    }
  );

doorsTargetTime.innerText =
  eventDateDoors.toLocaleString(
    undefined,
    {
      weekday:"long",
      month:"long",
      day:"numeric",
      year:"numeric",
      hour:"numeric",
      minute:"2-digit"
    }
  );

applyBackground();

/* =========================
   BOTTOM CLOCK
========================= */

function formatClock(){

  const now =
    new Date();

  let h =
    now.getHours();

  const m =
    String(now.getMinutes())
      .padStart(2,"0");

  const s =
    String(now.getSeconds())
      .padStart(2,"0");

  const ampm =
    h >= 12 ? "PM" : "AM";

  h =
    h % 12;

  h =
    h ? h : 12;

  return {
    h:h,
    m:m,
    s:s,
    ampm:ampm
  };
}

function renderClock(){

  const t =
    formatClock();

  const label =
    document.createElement("span");

  label.textContent =
    "TIME OF DAY:";

  const clock =
    document.createElement("span");

  clock.style.display =
    "inline-flex";

  clock.style.alignItems =
    "center";

  clock.style.gap =
    "0px";

  clock.innerHTML =
    `
      <span>${t.h}</span><span class="time-dot">:</span>
      <span>${t.m}</span><span class="time-dot">:</span>
      <span>${t.s}</span><span>${t.ampm}</span>
    `;

  timeOfDay.innerHTML =
    "";

  timeOfDay.style.display =
    "flex";

  timeOfDay.style.justifyContent =
    "center";

  timeOfDay.style.alignItems =
    "center";

  timeOfDay.style.gap =
    "8px";

  timeOfDay.appendChild(
    label
  );

  timeOfDay.appendChild(
    clock
  );
}

renderClock();

setInterval(
  renderClock,
  1000
);

/* =========================
   MAIN LOOP
========================= */

function tick(){

  const now =
    Date.now();

  const doorsRemaining =
    doorsTarget - now;

  const vipRemaining =
    vipTarget - now;

  const doorsParts =
    getCountdownParts(
      doorsRemaining
    );

  const vipParts =
    getCountdownParts(
      vipRemaining
    );

  renderBlock(
    "vip",
    vipParts
  );

  renderBlock(
    "doors",
    doorsParts
  );

  setBoxAlertState(
    "vip-box",
    vipRemaining
  );

  setBoxAlertState(
    "doors-box",
    doorsRemaining
  );

  const alerts = [
    ...collectAlerts(
      doorsRemaining,
      triggeredDoors,
      "DOORS"
    ),
    ...collectAlerts(
      vipRemaining,
      triggeredVip,
      "VIP DOORS"
    )
  ];

  if(alerts.length){

    showAlert(
      alerts.join("\n")
    );
  }
}

tick();

setInterval(
  tick,
  1000
);

document.addEventListener(
  "visibilitychange",
  () => {

    if(!document.hidden){
      tick();
    }
  }
);

</script>

</body>
</html>
