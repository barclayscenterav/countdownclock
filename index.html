<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barclays Center Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#00395d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  overflow:hidden;
  position:relative;
}

/* split logos */
.bg-left,
.bg-right{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  opacity:0.3;
  z-index:0;
  pointer-events:none;
}

.bg-left{ left:0; }
.bg-right{ right:0; }

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* alert states */
body.yellow-alert{
  background:linear-gradient(135deg,#3b2f00,#7a5c00) !important;
}

body.red-alert{
  background:linear-gradient(135deg,#3b0000,#7f0000) !important;
}

.container{
  position:relative;
  z-index:2;
  max-width:900px;
}

h1{
  font-size:3rem;
  text-transform:uppercase;
}

#targetTime{
  font-size:2.2rem;
  color:#cbd5e1;
  margin-bottom:10px;
}

/* bottom time display */
#eventTime{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);

  font-size:2rem;
  font-weight:bold;
  letter-spacing:2px;
  color:#ffffff;

  z-index:2;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
}

.number{
  font-size:5rem;
}

.label{
  text-transform:uppercase;
  color:#cbd5e1;
}

/* alert overlay */
#alertOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#alertBox{
  font-size:4rem;
  font-weight:900;
  color:red;
  text-transform:uppercase;

  animation:flashAlert 0.7s infinite;
}

/* flashing animation */
@keyframes flashAlert{

  0%{
    opacity:1;
    transform:scale(1);
  }

  50%{
    opacity:0.25;
    transform:scale(1.08);
  }

  100%{
    opacity:1;
    transform:scale(1);
  }
}

</style>
</head>

<body>

<div class="bg-left" id="bgLeft"></div>
<div class="bg-right" id="bgRight"></div>

<div class="container">

  <h1 id="title"></h1>

  <div id="targetTime"></div>

  <div class="countdown">

    <div class="box">
      <div id="hours" class="number">00</div>
      <div class="label">Hours</div>
    </div>

    <div class="box">
      <div id="minutes" class="number">00</div>
      <div class="label">Minutes</div>
    </div>

    <div class="box">
      <div id="seconds" class="number">00</div>
      <div class="label">Seconds</div>
    </div>

  </div>

</div>

<div id="eventTime"></div>

<div id="alertOverlay">
  <div id="alertBox"></div>
</div>

<script>

/* =========================
   URL PARAMS
========================= */

const params =
  new URLSearchParams(location.search);

const titleRaw =
  params.get("title") || "";

const eventName =
  params.get("event") || titleRaw;

const end =
  params.get("end");

if(!titleRaw || !end){

  document.body.innerHTML =
    "Invalid countdown link";
}

/* =========================
   NORMALIZER
========================= */

function normalizeTeamName(input){

  return (input || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g," ")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g,"")
    .trim();
}

/* =========================
   ALIASES
========================= */

const teamAliases = {

  "76ers":"sixers",
  "philadelphia 76ers":"sixers",

  "trail blazers":"blazers",
  "trailblazers":"blazers"
};

function applyAlias(key){

  return teamAliases[key] || key;
}

/* =========================
   NBA
========================= */

const nbaTeams = {

  hawks:{id:"1610612737"},
  celtics:{id:"1610612738"},
  hornets:{id:"1610612766"},
  bulls:{id:"1610612741"},
  cavaliers:{id:"1610612739"},
  mavericks:{id:"1610612742"},
  nuggets:{id:"1610612743"},
  pistons:{id:"1610612765"},
  warriors:{id:"1610612744"},
  rockets:{id:"1610612745"},
  pacers:{id:"1610612754"},
  clippers:{id:"1610612746"},
  lakers:{id:"1610612747"},
  grizzlies:{id:"1610612763"},
  heat:{id:"1610612748"},
  bucks:{id:"1610612749"},
  timberwolves:{id:"1610612750"},
  pelicans:{id:"1610612740"},
  knicks:{id:"1610612752"},
  thunder:{id:"1610612760"},
  magic:{id:"1610612753"},
  sixers:{id:"1610612755"},
  suns:{id:"1610612756"},
  blazers:{id:"1610612757"},
  kings:{id:"1610612758"},
  spurs:{id:"1610612759"},
  raptors:{id:"1610612761"},
  jazz:{id:"1610612762"},
  wizards:{id:"1610612764"},
  nets:{id:"1610612751"}
};

/* =========================
   WNBA
========================= */

const wnbaTeams = {

  aces:{id:"1611661319"},
  dream:{id:"1611661330"},
  fever:{id:"1611661325"},
  liberty:{id:"1611661313"},
  lynx:{id:"1611661324"},
  mercury:{id:"1611661317"},
  mystics:{id:"1611661322"},
  sky:{id:"1611661329"},
  sparks:{id:"1611661320"},
  storm:{id:"1611661328"},
  sun:{id:"1611661323"},
  tempo:{id:"1611661332"},
  valkyries:{id:"1611661331"},
  wings:{id:"1611661321"},
  fire:{id:"1611661327"}
};

/* =========================
   SMART MATCHUP PARSER
========================= */

function parseMatchup(title){

  const normalized =
    normalizeTeamName(title)
      .replace(/\s/g,"");

  const allTeams = [

    ...Object.keys(nbaTeams),
    ...Object.keys(wnbaTeams),
    ...Object.keys(teamAliases)
  ];

  const found = [];

  for(const team of allTeams){

    const normalizedTeam =
      team.replace(/\s/g,"");

    if(normalized.includes(normalizedTeam)){

      const aliasFixed =
        applyAlias(team);

      if(!found.includes(aliasFixed)){

        found.push(aliasFixed);
      }
    }
  }

  console.log("FOUND TEAMS:", found);

  if(found.length < 2){

    return null;
  }

  return {
    left: found[0],
    right: found[1]
  };
}

/* =========================
   LOOKUP
========================= */

function find(team){

  let key =
    normalizeTeamName(team);

  key =
    applyAlias(key);

  key =
    key.replace(/\s/g,"");

  if(nbaTeams[key]){

    return {
      league:"nba",
      ...nbaTeams[key]
    };
  }

  if(wnbaTeams[key]){

    return {
      league:"wnba",
      ...wnbaTeams[key]
    };
  }

  console.log("NO MATCH:", key);

  return null;
}

/* =========================
   LOGO URL
========================= */

function logo(team){

  if(!team) return null;

  return team.league === "nba"

    ? `https://cdn.nba.com/logos/nba/${team.id}/primary/D/logo.svg`

    : `https://cdn.wnba.com/logos/wnba/${team.id}/primary/D/logo.svg`;
}

/* =========================
   APPLY LOGOS
========================= */

function apply(){

  const matchup =
    parseMatchup(titleRaw);

  console.log("MATCHUP:", matchup);

  if(!matchup) return;

  const leftTeam =
    find(matchup.left);

  const rightTeam =
    find(matchup.right);

  const leftLogo =
    logo(leftTeam);

  const rightLogo =
    logo(rightTeam);

  if(leftLogo){

    bgLeft.style.backgroundImage =
      `url(${leftLogo})`;
  }

  if(rightLogo){

    bgRight.style.backgroundImage =
      `url(${rightLogo})`;
  }
}

/* =========================
   ALERT SYSTEM
========================= */

function showAlert(text){

  alertBox.innerText = text;

  alertOverlay.style.display = "flex";

  setTimeout(() => {

    alertOverlay.style.display = "none";

  }, 10000);
}

const target =
  new Date(end).getTime();

const alertTimes = [

  [3600000,"1 HOUR"],
  [1800000,"30 MINUTES"],
  [900000,"15 MINUTES"],
  [600000,"10 MINUTES"],
  [300000,"5 MINUTES"]
];

let triggered = {};

/* refresh-safe init */
(function initTriggered(){

  const now =
    Date.now();

  const remaining =
    target - now;

  for(const [time] of alertTimes){

    triggered[time] =
      remaining <= time;
  }

})();

/* =========================
   LABEL FIX
========================= */

function labelSingular(
  value,
  singular,
  plural
){

  return Number(value) === 1
    ? singular
    : plural;
}

/* =========================
   INIT
========================= */

title.innerText =
  titleRaw.toUpperCase();

const eventDate =
  new Date(end);

/* top display */
targetTime.innerText =
  eventDate.toLocaleString(
    undefined,
    {
      weekday:"long",
      month:"long",
      day:"numeric",
      year:"numeric",
      hour:"numeric",
      minute:"2-digit"
    }
  );

/* bottom display */
eventTime.innerText =
  eventDate.toLocaleTimeString(
    undefined,
    {
      hour:"numeric",
      minute:"2-digit"
    }
  );

apply();

/* =========================
   LOOP
========================= */

function tick(){

  const now =
    Date.now();

  const d =
    target - now;

  if(d <= 0) return;

  const h =
    String(
      Math.floor(d/3600000)
    ).padStart(2,"0");

  const m =
    String(
      Math.floor((d%3600000)/60000)
    ).padStart(2,"0");

  const s =
    String(
      Math.floor((d%60000)/1000)
    ).padStart(2,"0");

  hours.innerText = h;
  minutes.innerText = m;
  seconds.innerText = s;

  /* singular labels */

  document
    .querySelectorAll(".box")[0]
    .querySelector(".label")
    .innerText =
      labelSingular(
        h,
        "Hour",
        "Hours"
      );

  document
    .querySelectorAll(".box")[1]
    .querySelector(".label")
    .innerText =
      labelSingular(
        m,
        "Minute",
        "Minutes"
      );

  document
    .querySelectorAll(".box")[2]
    .querySelector(".label")
    .innerText =
      labelSingular(
        s,
        "Second",
        "Seconds"
      );

  /* color states */

  if(d <= 1800000){

    document.body.classList.add(
      "yellow-alert"
    );
  }

  if(d <= 300000){

    document.body.classList.remove(
      "yellow-alert"
    );

    document.body.classList.add(
      "red-alert"
    );
  }

  /* alerts */

  for(const [a,label] of alertTimes){

    if(d <= a && !triggered[a]){

      triggered[a] = true;

      showAlert(
        `${label} TO ${eventName}`
      );
    }
  }
}

tick();

setInterval(
  tick,
  1000
);

</script>

</body>
</html>
