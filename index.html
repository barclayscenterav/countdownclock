<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#00395d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
  overflow:hidden;
  position:relative;
}

/* 🏀 SPLIT BACKGROUND LOGOS */
.bg-left,
.bg-right{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  opacity:0.3;
  z-index:0;
  pointer-events:none;
}

.bg-left{ left:0; }
.bg-right{ right:0; }

/* dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* warnings */
body.yellow-alert{
  background:linear-gradient(135deg,#3b2f00,#7a5c00) !important;
}

body.red-alert{
  background:linear-gradient(135deg,#3b0000,#7f0000) !important;
}

.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:900px;
}

h1{
  font-size:3rem;
  margin-bottom:10px;
}

#targetTime{
  font-size:3rem;
  margin-bottom:40px;
  color:#cbd5e1;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:40px 20px;
  border-radius:20px;
}

.number{
  font-size:5rem;
  font-weight:bold;
}

.label{
  margin-top:10px;
  text-transform:uppercase;
  color:#cbd5e1;
}

/* hidden overlay placeholder if needed later */
#alertOverlay{
  display:none;
}

</style>
</head>

<body>

<div class="bg-left" id="bgLeft"></div>
<div class="bg-right" id="bgRight"></div>

<div class="container">

  <h1 id="title">Countdown</h1>
  <div id="targetTime"></div>

  <div class="countdown">
    <div class="box">
      <div class="number" id="hours">00</div>
      <div class="label">Hours</div>
    </div>

    <div class="box">
      <div class="number" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>

    <div class="box">
      <div class="number" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const titleRaw = params.get("title") || "";
const end = params.get("end");

/* 🏀 NBA */
const nbaTeams = {
  knicks: { id:"1610612752" },
  celtics: { id:"1610612738" },
  lakers: { id:"1610612747" },
  warriors: { id:"1610612744" },
  bulls: { id:"1610612741" },
  heat: { id:"1610612748" },
  nets: { id:"1610612751" }
};

/* 🏀 WNBA */
const wnbaTeams = {
  aces: { id:"1611661319" },
  dream: { id:"1611661330" },
  fever: { id:"1611661325" },
  liberty: { id:"1611661313" },
  lynx: { id:"1611661324" },
  mercury: { id:"1611661317" },
  mystics: { id:"1611661322" },
  sky: { id:"1611661329" },
  sparks: { id:"1611661320" },
  storm: { id:"1611661328" },
  sun: { id:"1611661323" },
  tempo: { id:"1611661332" },
  valkyries: { id:"1611661331" },
  wings: { id:"1611661321" },
  fire: { id:"1611661327" }
};

/* 🧠 MATCHUP PARSER (vs, vs., v, @) */
function parseMatchup(title){

  const parts = title.split(/\s*(vs\.?|v|@)\s*/i);

  const teams = parts.filter((_, i) => i % 2 === 0);

  if(teams.length < 2) return null;

  return {
    left: teams[0].trim().toLowerCase(),
    right: teams[1].trim().toLowerCase()
  };
}

/* 🔎 TEAM LOOKUP */
function findTeam(team){

  if(nbaTeams[team]) return { league:"nba", ...nbaTeams[team] };
  if(wnbaTeams[team]) return { league:"wnba", ...wnbaTeams[team] };

  return null;
}

/* 🖼 LOGO BUILDER */
function buildLogo(team){

  if(!team) return null;

  if(team.league === "nba"){
    return `https://cdn.nba.com/logos/nba/${team.id}/primary/D/logo.svg`;
  }

  if(team.league === "wnba"){
    return `https://cdn.wnba.com/logos/wnba/${team.id}/primary/D/logo.svg`;
  }

  return null;
}

/* 🏟 APPLY SPLIT BACKGROUND */
function applyMatchup(title){

  const matchup = parseMatchup(title);
  if(!matchup) return;

  const left = findTeam(matchup.left);
  const right = findTeam(matchup.right);

  const leftLogo = buildLogo(left);
  const rightLogo = buildLogo(right);

  if(leftLogo){
    document.getElementById("bgLeft").style.backgroundImage =
      `url('${leftLogo}')`;
  }

  if(rightLogo){
    document.getElementById("bgRight").style.backgroundImage =
      `url('${rightLogo}')`;
  }
}

/* INIT */
if(!titleRaw || !end){

  document.body.innerHTML = "<h2>Invalid countdown link</h2>";

} else {

  const target = new Date(end).getTime();

  document.getElementById("title").innerText = titleRaw;
  document.getElementById("targetTime").innerText =
    new Date(end).toLocaleString();

  applyMatchup(titleRaw);

  function update(){

    const now = Date.now();
    const distance = target - now;

    if(distance <= 0) return;

    const h = Math.floor(distance / 3600000);
    const m = Math.floor((distance % 3600000) / 60000);
    const s = Math.floor((distance % 60000) / 1000);

    document.getElementById("hours").innerText = String(h).padStart(2,"0");
    document.getElementById("minutes").innerText = String(m).padStart(2,"0");
    document.getElementById("seconds").innerText = String(s).padStart(2,"0");
  }

  update();
  setInterval(update,1000);
}

</script>

</body>
</html>
