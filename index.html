<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadcast Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:#00395d;
}

/* =========================
   BACKGROUNDS (LEFT / RIGHT)
========================= */
.bg-left,
.bg-right{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  z-index:0;
}

.layer{
  position:absolute;
  inset:0;
}

/* gradients */
.gradient{
  z-index:0;
}

/* logos */
.logo{
  z-index:1;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  opacity:0.85;
}

/* overlay */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:1;
}

/* =========================
   CENTER UI
========================= */
.container{
  position:relative;
  z-index:2;
}

h1{
  font-size:3.5rem;
  text-transform:uppercase;
  margin-bottom:10px;
}

#targetTime{
  font-size:2rem;
  opacity:0.8;
  margin-bottom:40px;
}

.countdown{
  display:flex;
  gap:40px;
  justify-content:center;
}

.box{
  min-width:160px;
}

.number{
  font-size:6rem;
  font-weight:bold;
}

.label{
  text-transform:uppercase;
  opacity:0.7;
}

/* =========================
   ALERT OVERLAY
========================= */
#alertOverlay{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:9999;
}

#alertBox{
  font-size:4rem;
  font-weight:900;
  color:red;
  text-transform:uppercase;
}

body.yellow{
  background:linear-gradient(135deg,#3a2f00,#8a6b00)!important;
}

body.red{
  background:linear-gradient(135deg,#3a0000,#7a0000)!important;
}

</style>
</head>

<body>

<div class="bg-left">
  <div class="layer gradient" id="gradLeft"></div>
  <div class="layer logo" id="logoLeft"></div>
</div>

<div class="bg-right">
  <div class="layer gradient" id="gradRight"></div>
  <div class="layer logo" id="logoRight"></div>
</div>

<div class="container">
  <h1 id="title"></h1>
  <div id="targetTime"></div>

  <div class="countdown">
    <div class="box"><div id="hours" class="number">00</div><div class="label">Hours</div></div>
    <div class="box"><div id="minutes" class="number">00</div><div class="label">Minutes</div></div>
    <div class="box"><div id="seconds" class="number">00</div><div class="label">Seconds</div></div>
  </div>
</div>

<div id="alertOverlay">
  <div id="alertBox"></div>
</div>

<script>

/* =========================
   INPUT
========================= */
const params = new URLSearchParams(location.search);

const titleRaw = (params.get("title") || "");
const eventName = params.get("event") || titleRaw;
const end = params.get("end");

if(!titleRaw || !end){
  document.body.innerHTML="Invalid countdown link";
}

/* =========================
   NORMALIZE
========================= */
function normalizeTeamName(input){
  return (input || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g,"")
    .replace(/[^a-z0-9]/g,"");
}

/* =========================
   STABLE MATCH PARSER (FIXED)
========================= */
function parseMatchup(t){
  const cleaned = (t || "").replace(/\s+/g," ").trim();
  const parts = cleaned.split(/\s+(?:vs\.?|v|@)\s+/i);
  if(parts.length < 2) return null;

  return {
    left: normalizeTeamName(parts[0]),
    right: normalizeTeamName(parts[1])
  };
}

/* =========================
   NBA IDS (FULL)
========================= */
const nbaTeams = {
  hawks:"1610612737",
  celtics:"1610612738",
  hornets:"1610612766",
  bulls:"1610612741",
  cavaliers:"1610612739",
  mavericks:"1610612742",
  nuggets:"1610612743",
  pistons:"1610612765",
  warriors:"1610612744",
  rockets:"1610612745",
  pacers:"1610612754",
  clippers:"1610612746",
  lakers:"1610612747",
  grizzlies:"1610612763",
  heat:"1610612748",
  bucks:"1610612749",
  timberwolves:"1610612750",
  pelicans:"1610612740",
  knicks:"1610612752",
  thunder:"1610612760",
  magic:"1610612753",
  sixers:"1610612755",
  suns:"1610612756",
  blazers:"1610612757",
  kings:"1610612758",
  spurs:"1610612759",
  raptors:"1610612761",
  jazz:"1610612762",
  wizards:"1610612764",
  nets:"1610612751"
};

/* =========================
   WNBA IDS (FULL)
========================= */
const wnbaTeams = {
  aces:"1611661319",
  dream:"1611661330",
  fever:"1611661325",
  liberty:"1611661313",
  lynx:"1611661324",
  mercury:"1611661317",
  mystics:"1611661322",
  sky:"1611661329",
  sparks:"1611661320",
  storm:"1611661328",
  sun:"1611661323",
  tempo:"1611661332",
  valkyries:"1611661331",
  wings:"1611661321",
  fire:"1611661327"
};

/* =========================
   COLORS (FULL RESTORE)
========================= */
const nbaColors = {
  hawks:["#E03A3E","#C1D32F"],
  celtics:["#007A33","#BA9653"],
  hornets:["#1D1160","#00788C"],
  bulls:["#CE1141","#000000"],
  cavaliers:["#860038","#BC945C"],
  mavericks:["#00538C","#B8C4CA"],
  nuggets:["#0E2240","#FEC524"],
  pistons:["#1D42BA","#C8102E"],
  warriors:["#1D428A","#FFC72C"],
  rockets:["#CE1141","#000000"],
  pacers:["#002D62","#FDBB30"],
  clippers:["#C8102E","#1D428A"],
  lakers:["#552583","#FDB927"],
  grizzlies:["#5D76A9","#12173F"],
  heat:["#98002E","#F9A01B"],
  bucks:["#00471B","#EEE1C6"],
  timberwolves:["#0C233F","#79BC43"],
  pelicans:["#0C2340","#85714D"],
  knicks:["#1D428A","#F58426"],
  thunder:["#007AC1","#EF3B24"],
  magic:["#0077C0","#C4CED4"],
  sixers:["#1D428A","#C8102E"],
  suns:["#1D1160","#E56020"],
  blazers:["#E03A3E","#000000"],
  kings:["#5A2D81","#63727A"],
  spurs:["#000000","#C4CED4"],
  raptors:["#CE1141","#000000"],
  jazz:["#000000","#FFF21F"],
  wizards:["#002B5C","#E31837"],
  nets:["#000000","#FFFFFF"]
};

const wnbaColors = {
  aces:["#CE1141","#061922"],
  dream:["#E31837","#373A36"],
  fever:["#E03A3E","#002D62"],
  liberty:["#86CEBC","#000000"],
  lynx:["#0C233F","#266092"],
  mercury:["#1D1160","#E56020"],
  mystics:["#E03A3E","#002B5C"],
  sky:["#5091CD","#FFD520"],
  sparks:["#552583","#FDB927"],
  storm:["#2C5235","#FEE11A"],
  sun:["#002D62","#F3703A"],
  tempo:["#441E36","#B3C7E7"],
  valkyries:["#AD96DB","#2D2A27"],
  wings:["#002B5C","#C4D600"],
  fire:["#000000","#C8102E"]
};

/* =========================
   LOOKUP
========================= */
function getColors(team){
  const key = normalizeTeamName(team);
  return nbaColors[key] || wnbaColors[key] || ["#00395d","#001b2b"];
}

/* =========================
   APPLY VISUALS
========================= */
function apply(){

  const m = parseMatchup(titleRaw);
  if(!m) return;

  const l = getColors(m.left);
  const r = getColors(m.right);

  gradLeft.style.background = `linear-gradient(135deg,${l[0]},${l[1]})`;
  gradRight.style.background = `linear-gradient(135deg,${r[0]},${r[1]})`;

  logoLeft.style.backgroundImage =
    nbaTeams[m.left] || wnbaTeams[m.left]
      ? `url(https://cdn.nba.com/logos/nba/${nbaTeams[m.left] || wnbaTeams[m.left]}/primary/D/logo.svg)`
      : "";

  logoRight.style.backgroundImage =
    nbaTeams[m.right] || wnbaTeams[m.right]
      ? `url(https://cdn.nba.com/logos/nba/${nbaTeams[m.right] || wnbaTeams[m.right]}/primary/D/logo.svg)`
      : "";
}

/* =========================
   ALERTS
========================= */
let triggered={3600000:false,1800000:false,900000:false,600000:false,300000:false};

function alertMsg(t){
  alertBox.innerText=t;
  alertOverlay.style.display="flex";
  setTimeout(()=>alertOverlay.style.display="none",15000);
}

const target = new Date(end).getTime();

title.innerText = titleRaw.toUpperCase();
targetTime.innerText = new Date(end).toLocaleString();

apply();

function tick(){

  const now = Date.now();
  const d = target - now;
  if(d<=0) return;

  hours.innerText = String(Math.floor(d/3600000)).padStart(2,"0");
  minutes.innerText = String(Math.floor((d%3600000)/60000)).padStart(2,"0");
  seconds.innerText = String(Math.floor((d%60000)/1000)).padStart(2,"0");

  if(d<=1800000) document.body.classList.add("yellow");
  if(d<=300000) document.body.classList.add("red");

  const alerts = [
    [3600000,"1 HOUR"],
    [1800000,"30 MINUTES"],
    [900000,"15 MINUTES"],
    [600000,"10 MINUTES"],
    [300000,"5 MINUTES"]
  ];

  for(const[a,label]of alerts){
    if(d<=a && !triggered[a]){
      triggered[a]=true;
      alertMsg(`${label} TO ${eventName}`);
    }
  }
}

tick();
setInterval(tick,1000);

</script>

</body>
</html>
