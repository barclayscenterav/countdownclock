<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Countdown Creator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:900px;
      background:rgba(255,255,255,0.08);
      border-radius:20px;
      padding:40px;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:2.5rem;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      font-size:1rem;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#3b82f6;
      color:white;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#2563eb;
    }

    .countdown-container{
      margin-top:40px;
      text-align:center;
      display:none;
    }

    #countdownTitle{
      font-size:2rem;
      margin-bottom:25px;
    }

    .countdown{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:20px;
    }

    .time-box{
      background:rgba(255,255,255,0.12);
      padding:25px 15px;
      border-radius:16px;
    }

    .number{
      font-size:3rem;
      font-weight:bold;
    }

    .label{
      margin-top:10px;
      color:#cbd5e1;
      text-transform:uppercase;
      font-size:0.9rem;
      letter-spacing:1px;
    }

    #finishedMessage{
      margin-top:30px;
      color:#4ade80;
      font-size:2rem;
    }

    @media(max-width:600px){
      h1{
        font-size:2rem;
      }

      .number{
        font-size:2.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Create Your Countdown</h1>

    <div class="form-group">
      <label>Countdown Title</label>
      <input type="text" id="titleInput" placeholder="Example: Vacation Countdown">
    </div>

    <div class="form-group">
      <label>Target Date & Time</label>
      <input type="datetime-local" id="dateInput">
    </div>

    <button onclick="startCountdown()">
      Start Countdown
    </button>

    <div class="countdown-container" id="countdownSection">

      <h2 id="countdownTitle"></h2>

      <div class="countdown">

        <div class="time-box">
          <div class="number" id="days">00</div>
          <div class="label">Days</div>
        </div>

        <div class="time-box">
          <div class="number" id="hours">00</div>
          <div class="label">Hours</div>
        </div>

        <div class="time-box">
          <div class="number" id="minutes">00</div>
          <div class="label">Minutes</div>
        </div>

        <div class="time-box">
          <div class="number" id="seconds">00</div>
          <div class="label">Seconds</div>
        </div>

      </div>

      <div id="finishedMessage"></div>

    </div>

  </div>

<script>

let countdownTimer;

function startCountdown(){

  const title = document.getElementById("titleInput").value;
  const selectedDate =
    document.getElementById("dateInput").value;

  if(!title || !selectedDate){
    alert("Please enter a title and date.");
    return;
  }

  document.getElementById("countdownTitle").innerText = title;

  const targetDate =
    new Date(selectedDate).getTime();

  document.getElementById("countdownSection")
    .style.display = "block";

  clearInterval(countdownTimer);

  function updateCountdown(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance <= 0){

      clearInterval(countdownTimer);

      document.getElementById("days").innerText = "00";
      document.getElementById("hours").innerText = "00";
      document.getElementById("minutes").innerText = "00";
      document.getElementById("seconds").innerText = "00";

      document.getElementById("finishedMessage")
        .innerText = "Countdown Complete!";

      return;
    }

    const days =
      Math.floor(distance / (1000*60*60*24));

    const hours =
      Math.floor((distance % (1000*60*60*24))
      / (1000*60*60));

    const minutes =
      Math.floor((distance % (1000*60*60))
      / (1000*60));

    const seconds =
      Math.floor((distance % (1000*60))
      / 1000);

    document.getElementById("days").innerText =
      String(days).padStart(2,"0");

    document.getElementById("hours").innerText =
      String(hours).padStart(2,"0");

    document.getElementById("minutes").innerText =
      String(minutes).padStart(2,"0");

    document.getElementById("seconds").innerText =
      String(seconds).padStart(2,"0");
  }

  updateCountdown();

  countdownTimer =
    setInterval(updateCountdown,1000);
}

</script>

</body>
</html>
