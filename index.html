<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#00395d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  overflow:hidden;
  position:relative;
}

/* split logos */
.bg-left,
.bg-right{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  opacity:0.3;
  z-index:0;
  pointer-events:none;
}

.bg-left{ left:0; }
.bg-right{ right:0; }

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* alert states */
body.yellow-alert{
  background:linear-gradient(135deg,#3b2f00,#7a5c00) !important;
}

body.red-alert{
  background:linear-gradient(135deg,#3b0000,#7f0000) !important;
}

.container{
  position:relative;
  z-index:2;
  max-width:900px;
}

h1{ font-size:3rem; }

#targetTime{
  font-size:3rem;
  color:#cbd5e1;
  margin-bottom:30px;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
}

.number{ font-size:5rem; }

.label{
  text-transform:uppercase;
  color:#cbd5e1;
}

/* alert */
#alertOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#alertBox{
  font-size:4rem;
  font-weight:900;
  color:red;
  text-transform:uppercase;
}

</style>
</head>

<body>

<div class="bg-left" id="bgLeft"></div>
<div class="bg-right" id="bgRight"></div>

<div class="container">
  <h1 id="title"></h1>
  <div id="targetTime"></div>

  <div class="countdown">
    <div class="box"><div id="hours" class="number">00</div><div class="label">Hours</div></div>
    <div class="box"><div id="minutes" class="number">00</div><div class="label">Minutes</div></div>
    <div class="box"><div id="seconds" class="number">00</div><div class="label">Seconds</div></div>
  </div>
</div>

<div id="alertOverlay"><div id="alertBox"></div></div>

<script>

const params = new URLSearchParams(location.search);

const titleRaw = params.get("title") || "";
const eventName = params.get("event") || titleRaw;
const end = params.get("end");

if(!titleRaw || !end){
  document.body.innerHTML = "Invalid countdown link";
}

/* 🧠 SINGLE TRUE NORMALIZER (NO EDGE CASES LEFT) */
function normalizeTeamName(input){
  return (input || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]/g,"");
}

/* 🏀 NBA */
const nbaTeams = {
  hawks:{id:"1610612737"},
  celtics:{id:"1610612738"},
  hornets:{id:"1610612766"},
  bulls:{id:"1610612741"},
  cavaliers:{id:"1610612739"},
  mavericks:{id:"1610612742"},
  nuggets:{id:"1610612743"},
  pistons:{id:"1610612765"},
  warriors:{id:"1610612744"},
  rockets:{id:"1610612745"},
  pacers:{id:"1610612754"},
  clippers:{id:"1610612746"},
  lakers:{id:"1610612747"},
  grizzlies:{id:"1610612763"},
  heat:{id:"1610612748"},
  bucks:{id:"1610612749"},
  timberwolves:{id:"1610612750"},
  pelicans:{id:"1610612740"},
  knicks:{id:"1610612752"},
  thunder:{id:"1610612760"},
  magic:{id:"1610612753"},
  sixers:{id:"1610612755"},
  suns:{id:"1610612756"},
  blazers:{id:"1610612757"},
  kings:{id:"1610612758"},
  spurs:{id:"1610612759"},
  raptors:{id:"1610612761"},
  jazz:{id:"1610612762"},
  wizards:{id:"1610612764"},
  nets:{id:"1610612751"}
};

/* 🏀 WNBA */
const wnbaTeams = {
  aces:{id:"1611661319"},
  dream:{id:"1611661330"},
  fever:{id:"1611661325"},
  liberty:{id:"1611661313"},
  lynx:{id:"1611661324"},
  mercury:{id:"1611661317"},
  mystics:{id:"1611661322"},
  sky:{id:"1611661329"},
  sparks:{id:"1611661320"},
  storm:{id:"1611661328"},
  sun:{id:"1611661323"},
  tempo:{id:"1611661332"},
  valkyries:{id:"1611661331"},
  wings:{id:"1611661321"},
  fire:{id:"1611661327"}
};

/* 🧠 MATCHUP PARSER */
function parseMatchup(t){

  const cleaned = (t || "")
    .replace(/\s+/g," ")
    .trim();

  const parts = cleaned.split(/\s*(vs\.?|v|@)\s*/i);

  const teams = parts
    .filter((_,i)=>i%2===0)
    .map(normalizeTeamName)
    .filter(Boolean);

  if(teams.length < 2) return null;

  return {
    left:teams[0],
    right:teams[1]
  };
}

/* 🔎 SAFE LOOKUP (NO FAIL CASES POSSIBLE) */
function find(team){

  const key = normalizeTeamName(team);

  const nba = nbaTeams[key];
  if(nba) return {league:"nba",...nba};

  const wnba = wnbaTeams[key];
  if(wnba) return {league:"wnba",...wnba};

  return null;
}

/* 🖼 LOGO BUILDER */
function logo(t){
  if(!t) return null;

  return t.league==="nba"
    ? `https://cdn.nba.com/logos/nba/${t.id}/primary/D/logo.svg`
    : `https://cdn.wnba.com/logos/wnba/${t.id}/primary/D/logo.svg`;
}

/* 🏟 APPLY BACKGROUND */
function apply(){

  const m = parseMatchup(titleRaw);
  if(!m) return;

  const l = logo(find(m.left));
  const r = logo(find(m.right));

  if(l) bgLeft.style.backgroundImage=`url(${l})`;
  if(r) bgRight.style.backgroundImage=`url(${r})`;
}

/* ⏰ ALERT SYSTEM */
let triggered={
  3600000:false,
  1800000:false,
  900000:false,
  600000:false,
  300000:false
};

function showAlert(text){
  alertBox.innerText=text;
  alertOverlay.style.display="flex";
  setTimeout(()=>alertOverlay.style.display="none",15000);
}

const target=new Date(end).getTime();

title.innerText=titleRaw;
targetTime.innerText=new Date(end).toLocaleString();

apply();

function tick(){

  const now=Date.now();
  const d=target-now;
  if(d<=0)return;

  hours.innerText=String(Math.floor(d/3600000)).padStart(2,"0");
  minutes.innerText=String(Math.floor((d%3600000)/60000)).padStart(2,"0");
  seconds.innerText=String(Math.floor((d%60000)/1000)).padStart(2,"0");

  if(d<=1800000)document.body.classList.add("yellow-alert");

  if(d<=300000){
    document.body.classList.remove("yellow-alert");
    document.body.classList.add("red-alert");
  }

  const alerts=[
    [3600000,"1 HOUR"],
    [1800000,"30 MINUTES"],
    [900000,"15 MINUTES"],
    [600000,"10 MINUTES"],
    [300000,"5 MINUTES"]
  ];

  for(const[a,label]of alerts){
    if(d<=a&&!triggered[a]){
      triggered[a]=true;
      showAlert(`${label} TO ${eventName}`);
    }
  }
}

tick();
setInterval(tick,1000);

</script>

</body>
</html>
