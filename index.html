<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#00395d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
  transition: background 2s ease;
  position:relative;
  overflow:hidden;
}

/* 🧊 SPLIT SCREEN LOGO LAYER */
.bg-left,
.bg-right{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  opacity:0.3;
  z-index:0;
  pointer-events:none;
}

.bg-left{ left:0; }
.bg-right{ right:0; }

/* dark overlay for readability */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* 🟡 30 min */
body.yellow-alert{
  background:linear-gradient(135deg,#3b2f00,#7a5c00) !important;
}

/* 🔴 5 min */
body.red-alert{
  background:linear-gradient(135deg,#3b0000,#7f0000) !important;
}

.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:900px;
}

h1{
  font-size:3rem;
  margin-bottom:10px;
}

#targetTime{
  font-size:3rem;
  margin-bottom:40px;
  color:#cbd5e1;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:40px 20px;
  border-radius:20px;
}

.number{
  font-size:5rem;
  font-weight:bold;
}

.label{
  margin-top:10px;
  text-transform:uppercase;
  color:#cbd5e1;
}

</style>
</head>

<body>

<!-- 🧊 SPLIT BACKGROUND ELEMENTS -->
<div class="bg-left" id="bgLeft"></div>
<div class="bg-right" id="bgRight"></div>

<div class="container">

  <h1 id="title">Countdown</h1>
  <div id="targetTime"></div>

  <div class="countdown">
    <div class="box">
      <div class="number" id="hours">00</div>
      <div class="label">Hours</div>
    </div>

    <div class="box">
      <div class="number" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>

    <div class="box">
      <div class="number" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

</div>

<script>

const nbaTeams = {
  "hawks": "1610612737",
  "celtics": "1610612738",
  "nets": "1610612751",
  "hornets": "1610612766",
  "bulls": "1610612741",
  "cavaliers": "1610612739",
  "mavericks": "1610612742",
  "nuggets": "1610612743",
  "pistons": "1610612765",
  "warriors": "1610612744",
  "rockets": "1610612745",
  "pacers": "1610612754",
  "clippers": "1610612746",
  "lakers": "1610612747",
  "grizzlies": "1610612763",
  "heat": "1610612748",
  "bucks": "1610612749",
  "timberwolves": "1610612750",
  "pelicans": "1610612740",
  "knicks": "1610612752",
  "thunder": "1610612760",
  "magic": "1610612753",
  "76ers": "1610612755",
  "suns": "1610612756",
  "trailblazers": "1610612757",
  "kings": "1610612758",
  "spurs": "1610612759",
  "raptors": "1610612761",
  "jazz": "1610612762",
  "wizards": "1610612764"
};

const wnbaTeams = {
  "dream": "1611661312",
  "fever": "1611661320",
  "sky": "1611661325",
  "sun": "1611661324",
  "liberty": "1611661313",
  "aces": "1611661323",
  "lynx": "1611661317",
  "mercury": "1611661321",
  "mystics": "1611661319",
  "storm": "1611661316",
  "wings": "1611661322",
  "valkyries": "1611661330",
  "fire": "1611661331",
  "blaze": "1611661332",
  "rising": "1611661333"
};

const params = new URLSearchParams(window.location.search);

const titleRaw = params.get("title") || "";
const title = titleRaw.toLowerCase();
const end = params.get("end");

function detectMatchup(){

  let teams = titleRaw.split(/ vs | v | @ /i);

  if(teams.length < 2){
    return null;
  }

  return {
    left: teams[0].trim().toLowerCase(),
    right: teams[1].trim().toLowerCase()
  };
}

function getLogo(team){

  if(nbaTeams[team]){
    return `https://cdn.nba.com/logos/nba/${nbaTeams[team]}/primary/D/logo.svg`;
  }

  if(wnbaTeams[team]){
    return `https://cdn.wnba.com/logos/wnba/${wnbaTeams[team]}/primary/D/logo.svg`;
  }

  return null;
}

function applyMatchupBackground(){

  const matchup = detectMatchup();

  if(!matchup) return;

  const leftLogo = getLogo(matchup.left);
  const rightLogo = getLogo(matchup.right);

  if(leftLogo){
    document.getElementById("bgLeft").style.backgroundImage =
      `url('${leftLogo}')`;
  }

  if(rightLogo){
    document.getElementById("bgRight").style.backgroundImage =
      `url('${rightLogo}')`;
  }
}

if(!titleRaw || !end){

  document.body.innerHTML = "<h2>Invalid link</h2>";

} else {

  const target = new Date(end).getTime();

  document.getElementById("title").innerText = titleRaw;
  document.getElementById("targetTime").innerText =
    new Date(end).toLocaleString();

  applyMatchupBackground();

  function update(){

    const now = Date.now();
    const distance = target - now;

    if(distance <= 0) return;

    const h = Math.floor(distance/3600000);
    const m = Math.floor((distance%3600000)/60000);
    const s = Math.floor((distance%60000)/1000);

    document.getElementById("hours").innerText = String(h).padStart(2,"0");
    document.getElementById("minutes").innerText = String(m).padStart(2,"0");
    document.getElementById("seconds").innerText = String(s).padStart(2,"0");
  }

  update();
  setInterval(update,1000);
}

</script>

</body>
</html>
