<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#00395d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  overflow:hidden;
  position:relative;
}

/* split logos */
.bg-left,
.bg-right{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  opacity:0.3;
  z-index:0;
  pointer-events:none;
}

.bg-left{ left:0; }
.bg-right{ right:0; }

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* alert states */
body.yellow-alert{
  background:linear-gradient(135deg,#3b2f00,#7a5c00) !important;
}

body.red-alert{
  background:linear-gradient(135deg,#3b0000,#7f0000) !important;
}

.container{
  position:relative;
  z-index:2;
  max-width:900px;
}

h1{
  font-size:3rem;
  text-transform:uppercase;
}

#targetTime{
  font-size:2.2rem;
  color:#cbd5e1;
  margin-bottom:10px;
}

/* bottom clock */
#timeOfDay{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  font-size:1.8rem;
  font-weight:800;
  color:#fff;
  z-index:2;
  text-transform:uppercase;
  display:flex;
  justify-content:center;
}

#timeOfDay span{
  white-space:nowrap;
}

.time-dot{
  animation:flashDot 1s infinite;
}

@keyframes flashDot{
  0%,100%{opacity:1;}
  50%{opacity:0.2;}
}

.countdown{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
}

.number{
  font-size:5rem;
}

.label{
  text-transform:uppercase;
  color:#cbd5e1;
}

/* alert */
#alertOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#alertBox{
  font-size:4rem;
  font-weight:900;
  color:red;
  text-transform:uppercase;
  animation:flashAlert 0.7s infinite;
}

@keyframes flashAlert{
  0%{opacity:1;transform:scale(1);}
  50%{opacity:0.25;transform:scale(1.08);}
  100%{opacity:1;transform:scale(1);}
}

</style>
</head>

<body>

<div class="bg-left" id="bgLeft"></div>
<div class="bg-right" id="bgRight"></div>

<div class="container">

  <h1 id="title"></h1>
  <div id="targetTime"></div>

  <div class="countdown">
    <div class="box">
      <div id="hours" class="number">00</div>
      <div class="label">Hours</div>
    </div>

    <div class="box">
      <div id="minutes" class="number">00</div>
      <div class="label">Minutes</div>
    </div>

    <div class="box">
      <div id="seconds" class="number">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

</div>

<div id="timeOfDay"></div>

<div id="alertOverlay">
  <div id="alertBox"></div>
</div>

<script>

const params = new URLSearchParams(location.search);

const titleRaw = params.get("title") || "";
const eventName = params.get("event") || titleRaw;
const end = params.get("end");

if(!titleRaw || !end){
  document.body.innerHTML = "Invalid countdown link";
}

/* ---------------- NORMALIZER ---------------- */

function normalizeTeamName(input){
  return (input || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g," ")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g,"")
    .trim();
}

/* ---------------- TEAMS ---------------- */

const nbaTeams = {
  hawks:{id:"1610612737"},
  celtics:{id:"1610612738"},
  hornets:{id:"1610612766"},
  bulls:{id:"1610612741"},
  cavaliers:{id:"1610612739"},
  mavericks:{id:"1610612742"},
  nuggets:{id:"1610612743"},
  pistons:{id:"1610612765"},
  warriors:{id:"1610612744"},
  rockets:{id:"1610612745"},
  pacers:{id:"1610612754"},
  clippers:{id:"1610612746"},
  lakers:{id:"1610612747"},
  grizzlies:{id:"1610612763"},
  heat:{id:"1610612748"},
  bucks:{id:"1610612749"},
  timberwolves:{id:"1610612750"},
  pelicans:{id:"1610612740"},
  knicks:{id:"1610612752"},
  thunder:{id:"1610612760"},
  magic:{id:"1610612753"},
  sixers:{id:"1610612755"},
  suns:{id:"1610612756"},
  blazers:{id:"1610612757"},
  kings:{id:"1610612758"},
  spurs:{id:"1610612759"},
  raptors:{id:"1610612761"},
  jazz:{id:"1610612762"},
  wizards:{id:"1610612764"},
  nets:{id:"1610612751"}
};

const wnbaTeams = {
  aces:{id:"1611661319"},
  dream:{id:"1611661330"},
  fever:{id:"1611661325"},
  liberty:{id:"1611661313"},
  lynx:{id:"1611661324"},
  mercury:{id:"1611661317"},
  mystics:{id:"1611661322"},
  sky:{id:"1611661329"},
  sparks:{id:"1611661320"},
  storm:{id:"1611661328"},
  sun:{id:"1611661323"},
  tempo:{id:"1611661332"},
  valkyries:{id:"1611661331"},
  wings:{id:"1611661321"},
  fire:{id:"1611661327"}
};

/* alias */
const teamAliases = {
  "76ers":"sixers",
  "philadelphia 76ers":"sixers",
  "trail blazers":"blazers",
  "trailblazers":"blazers"
};

function applyAlias(k){
  return teamAliases[k] || k;
}

/* ---------------- SMART MATCHUP ---------------- */

function parseMatchup(title){

  const cleaned = normalizeTeamName(title).replace(/\s/g,"");

  const allTeams = [
    ...Object.keys(nbaTeams),
    ...Object.keys(wnbaTeams),
    ...Object.keys(teamAliases)
  ];

  const found = [];

  for(const t of allTeams){

    const key = t.replace(/\s/g,"");

    if(cleaned.includes(key)){

      const fixed = applyAlias(t);

      if(!found.includes(fixed)){
        found.push(fixed);
      }
    }
  }

  if(found.length < 2) return null;

  return {
    left:found[0],
    right:found[1]
  };
}

/* ---------------- LOOKUP ---------------- */

function find(team){

  let key = normalizeTeamName(team);
  key = applyAlias(key);
  key = key.replace(/\s/g,"");

  if(nbaTeams[key]) return {league:"nba",...nbaTeams[key]};
  if(wnbaTeams[key]) return {league:"wnba",...wnbaTeams[key]};

  return null;
}

/* ---------------- LOGO ---------------- */

function logo(t){
  if(!t) return null;

  return t.league==="nba"
    ? `https://cdn.nba.com/logos/nba/${t.id}/primary/D/logo.svg`
    : `https://cdn.wnba.com/logos/wnba/${t.id}/primary/D/logo.svg`;
}

/* ---------------- APPLY ---------------- */

function apply(){

  const m = parseMatchup(titleRaw);
  if(!m) return;

  const l = logo(find(m.left));
  const r = logo(find(m.right));

  if(l) bgLeft.style.backgroundImage=`url(${l})`;
  if(r) bgRight.style.backgroundImage=`url(${r})`;
}

/* ---------------- CLOCK ---------------- */

function formatClock(){
  const n = new Date();
  let h = n.getHours();
  const m = String(n.getMinutes()).padStart(2,"0");
  const s = String(n.getSeconds()).padStart(2,"0");
  const ampm = h>=12?"PM":"AM";
  h = h%12||12;
  return {h,m,s,ampm};
}

function renderClock(){
  const t = formatClock();

  timeOfDay.innerHTML = `
    TIME OF DAY:
    <span>${t.h}</span><span class="time-dot">:</span>
    <span>${t.m}</span><span class="time-dot">:</span>
    <span>${t.s}</span><span>${t.ampm}</span>
  `;
}

renderClock();
setInterval(renderClock,1000);

/* ---------------- COUNTDOWN ---------------- */

let triggered={3600000:false,1800000:false,900000:false,600000:false,300000:false};

function showAlert(text){
  alertBox.innerText=text;
  alertOverlay.style.display="flex";
  setTimeout(()=>alertOverlay.style.display="none",10000);
}

const target = new Date(end).getTime();

title.innerText = titleRaw.toUpperCase();
targetTime.innerText = new Date(end).toLocaleString();

apply();

function tick(){

  const now=Date.now();
  const d=target-now;
  if(d<=0) return;

  hours.innerText=String(Math.floor(d/3600000)).padStart(2,"0");
  minutes.innerText=String(Math.floor((d%3600000)/60000)).padStart(2,"0");
  seconds.innerText=String(Math.floor((d%60000)/1000)).padStart(2,"0");

  const alerts=[
    [3600000,"1 HOUR"],
    [1800000,"30 MINUTES"],
    [900000,"15 MINUTES"],
    [600000,"10 MINUTES"],
    [300000,"5 MINUTES"]
  ];

  for(const [a,label] of alerts){
    if(d<=a && !triggered[a]){
      triggered[a]=true;
      showAlert(`${label} TO ${eventName}`);
    }
  }
}

tick();
setInterval(tick,1000);

</script>

</body>
</html>
