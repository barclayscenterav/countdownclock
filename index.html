<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:
    linear-gradient(
      135deg,
      #0f172a,
      #1e293b
    );

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;

  text-align:center;

  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
}

h1{
  font-size:3rem;
  margin-bottom:40px;
}

.countdown{
  display:grid;

  grid-template-columns:
    repeat(
      auto-fit,
      minmax(180px,1fr)
    );

  gap:20px;
}

.box{
  background:
    rgba(255,255,255,0.1);

  padding:40px 20px;

  border-radius:20px;
}

.number{
  font-size:5rem;
  font-weight:bold;
}

.label{
  margin-top:10px;

  color:#cbd5e1;

  text-transform:uppercase;
}

#endTimeDisplay{
  margin-top:30px;

  color:#cbd5e1;

  font-size:1.2rem;
}

#message{
  margin-top:30px;

  font-size:2rem;

  color:#4ade80;
}

@media(max-width:600px){

  h1{
    font-size:2rem;
  }

  .number{
    font-size:3rem;
  }

}

</style>
</head>

<body>

<div class="container">

  <h1 id="title">
    Countdown
  </h1>

  <div class="countdown">

    <div class="box">

      <div
        class="number"
        id="hours"
      >
        00
      </div>

      <div class="label">
        Hours
      </div>

    </div>

    <div class="box">

      <div
        class="number"
        id="minutes"
      >
        00
      </div>

      <div class="label">
        Minutes
      </div>

    </div>

    <div class="box">

      <div
        class="number"
        id="seconds"
      >
        00
      </div>

      <div class="label">
        Seconds
      </div>

    </div>

  </div>

  <div id="endTimeDisplay"></div>

  <div id="message"></div>

</div>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const title =
  params.get("title");

const end =
  params.get("end");

if(!title || !end){

  document.getElementById(
    "message"
  ).innerText =
    "Invalid countdown link.";

} else {

  document.getElementById(
    "title"
  ).innerText = title;

  const targetDate =
    new Date(end).getTime();

  const formattedDate =
    new Date(end)
      .toLocaleString();

  document.getElementById(
    "endTimeDisplay"
  ).innerText =
    "Ends on: " +
    formattedDate;

  function updateCountdown(){

    const now =
      new Date().getTime();

    const distance =
      targetDate - now;

    if(distance <= 0){

      clearInterval(timer);

      document.getElementById(
        "hours"
      ).innerText = "00";

      document.getElementById(
        "minutes"
      ).innerText = "00";

      document.getElementById(
        "seconds"
      ).innerText = "00";

      document.getElementById(
        "message"
      ).innerText =
        "Countdown Complete!";

      return;
    }

    const totalHours =
      Math.floor(
        distance /
        (1000*60*60)
      );

    const minutes =
      Math.floor(
        (distance %
        (1000*60*60))
        /
        (1000*60)
      );

    const seconds =
      Math.floor(
        (distance %
        (1000*60))
        /
        1000
      );

    document.getElementById(
      "hours"
    ).innerText =
      String(totalHours)
        .padStart(2,"0");

    document.getElementById(
      "minutes"
    ).innerText =
      String(minutes)
        .padStart(2,"0");

    document.getElementById(
      "seconds"
    ).innerText =
      String(seconds)
        .padStart(2,"0");
  }

  updateCountdown();

  const timer =
    setInterval(
      updateCountdown,
      1000
    );
}

</script>

</body>
</html>
