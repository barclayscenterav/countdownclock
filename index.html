<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
}

h1{
  font-size:3rem;
  margin-bottom:40px;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:40px 20px;
  border-radius:20px;
}

.number{
  font-size:5rem;
  font-weight:bold;
}

.label{
  margin-top:10px;
  color:#cbd5e1;
  text-transform:uppercase;
  font-size:1rem;
}

#endTimeDisplay{
  margin-top:30px;
  color:#cbd5e1;
  font-size:1.2rem;
}

#message{
  margin-top:30px;
  font-size:2rem;
  color:#4ade80;
}

/* ALERT OVERLAY */
#alertOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#alertBox{
  font-size:3rem;
  font-weight:bold;
  color:red;
  text-transform:uppercase;
  text-align:center;
  padding:20px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.15);}
  100%{transform:scale(1);}
}

@media(max-width:600px){
  h1{font-size:2rem;}
  .number{font-size:3rem;}
  #alertBox{font-size:2rem;}
}

</style>
</head>

<body>

<div class="container">

  <h1 id="title">Countdown</h1>

  <div class="countdown">

    <div class="box">
      <div class="number" id="hours">00</div>
      <div class="label" id="hoursLabel">Hours</div>
    </div>

    <div class="box">
      <div class="number" id="minutes">00</div>
      <div class="label" id="minutesLabel">Minutes</div>
    </div>

    <div class="box">
      <div class="number" id="seconds">00</div>
      <div class="label" id="secondsLabel">Seconds</div>
    </div>

  </div>

  <div id="endTimeDisplay"></div>
  <div id="message"></div>

</div>

<!-- ALERT -->
<div id="alertOverlay">
  <div id="alertBox"></div>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const title = params.get("title");
const end = params.get("end");

let lastAlertKey = "";

if(!title || !end){

  document.getElementById("message").innerText =
    "Invalid countdown link.";

} else {

  document.getElementById("title").innerText = title;

  const targetDate = new Date(end).getTime();

  document.getElementById("endTimeDisplay").innerText =
    "Ends on: " + new Date(end).toLocaleString();

  function showAlert(text){

    const box = document.getElementById("alertBox");

    box.innerText = text;
    box.style.color = "red";
    box.style.textTransform = "uppercase";

    document.getElementById("alertOverlay").style.display = "flex";

    setTimeout(()=>{
      document.getElementById("alertOverlay").style.display = "none";
    },15000);
  }

  function updateCountdown(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance <= 0){

      clearInterval(timer);

      document.getElementById("hours").innerText = "00";
      document.getElementById("minutes").innerText = "00";
      document.getElementById("seconds").innerText = "00";

      document.getElementById("message").innerText =
        "Countdown Complete!";

      return;
    }

    const totalMinutes = Math.floor(distance / (1000 * 60));
    const hours = Math.floor(distance / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("hours").innerText =
      String(hours).padStart(2,"0");

    document.getElementById("minutes").innerText =
      String(minutes).padStart(2,"0");

    document.getElementById("seconds").innerText =
      String(seconds).padStart(2,"0");

    // labels
    document.getElementById("hoursLabel").innerText =
      hours === 1 ? "Hour" : "Hours";

    document.getElementById("minutesLabel").innerText =
      minutes === 1 ? "Minute" : "Minutes";

    document.getElementById("secondsLabel").innerText =
      seconds === 1 ? "Second" : "Seconds";

    // alert triggers
    let alertKey = "";

    if(totalMinutes === 30 && seconds === 0) alertKey = "30";
    else if(totalMinutes === 15 && seconds === 0) alertKey = "15";
    else if(totalMinutes === 10 && seconds === 0) alertKey = "10";
    else if(totalMinutes === 5 && seconds === 0) alertKey = "5";
    else if(totalMinutes % 60 === 0 && seconds === 0 && totalMinutes > 0)
      alertKey = "hour-" + totalMinutes;

    if(alertKey && alertKey !== lastAlertKey){

      lastAlertKey = alertKey;

      let timeText;

      if(totalMinutes >= 60){
        const hrs = Math.floor(totalMinutes / 60);
        timeText = `${hrs} HOUR${hrs === 1 ? "" : "S"}`;
      } else {
        timeText = `${totalMinutes} MINUTE${totalMinutes === 1 ? "" : "S"}`;
      }

      showAlert(`${timeText} TO ${title}`);
    }
  }

  updateCountdown();
  const timer = setInterval(updateCountdown, 1000);
}

</script>

</body>
</html>
